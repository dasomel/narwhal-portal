apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: narwhal-portal

build:
  cluster:
    namespace: devtools
    dockerConfig:
      secretName: idp-portal-kaniko-harbor
    volumes:
      - name: narwhal-ca
        secret:
          secretName: narwhal-root-ca-secret
          items:
            - key: ca.crt
              path: ca.crt
    concurrency: 1
    timeout: 20m
    # Kaniko가 node_modules(800+ 패키지) 스냅샷 시 OOMKilled 방지
    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
  tagPolicy:
    customTemplate:
      template: "dev-{{.USER}}-{{.NOW}}"
      components:
        - name: USER
          envTemplate:
            template: "{{.USER}}"
        - name: NOW
          dateTime:
            format: "20060102-150405"
            timezone: "Local"
  artifacts:
    - image: harbor.local.narwhal.internal/library/narwhal-portal
      context: .
      kaniko:
        dockerfile: Dockerfile
        cache:
          repo: harbor.local.narwhal.internal/library/narwhal-portal-cache
        volumeMounts:
          - name: narwhal-ca
            mountPath: /kaniko/ssl/certs/narwhal
        registryCertificate:
          harbor.local.narwhal.internal: /kaniko/ssl/certs/narwhal/ca.crt

manifests:
  rawYaml:
    - ../narwhal/gitops/resources/narwhal-portal-k8s.yaml

deploy:
  kubectl:
    defaultNamespace: devtools
    flags:
      apply:
        - --server-side
        - --force-conflicts

portForward:
  - resourceType: service
    resourceName: narwhal-portal
    namespace: devtools
    port: 3000
    localPort: 3000

profiles:
  # Fast iteration: dev image with HMR + file sync.
  - name: dev
    activation:
      - command: dev
    # Dev-only manifest: same as gitops/resources/narwhal-portal-k8s.yaml minus the
    # security-system Role/RoleBinding (cross-ns objects the kubectl deployer can't
    # apply under a single defaultNamespace; they already exist via ArgoCD).
    manifests:
      rawYaml:
        - deploy/skaffold-dev-portal.yaml
    build:
      # Local Docker build on the Mac (ample memory) — in-cluster kaniko OOMs on the
      # small VM nodes when snapshotting node_modules. Pushes to Harbor; dev pod pulls.
      local:
        push: true
        useDockerCLI: true
        concurrency: 1
      artifacts:
        - image: harbor.local.narwhal.internal/library/narwhal-portal
          context: .
          docker:
            dockerfile: Dockerfile.dev
          sync:
            manual:
              - src: "src/**/*.{ts,tsx,js,jsx,css}"
                dest: /app
              - src: "public/**/*"
                dest: /app
              - src: "next.config.ts"
                dest: /app

  # IntelliJ / VS Code debugger attach on localhost:9229
  - name: debug
    build:
      cluster:
        namespace: devtools
        dockerConfig:
          secretName: idp-portal-kaniko-harbor
        volumes:
          - name: narwhal-ca
            secret:
              secretName: narwhal-root-ca-secret
              items:
                - key: ca.crt
                  path: ca.crt
        concurrency: 1
        timeout: 20m
        resources:
          requests:
            cpu: "1"
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
      artifacts:
        - image: harbor.local.narwhal.internal/library/narwhal-portal
          context: .
          kaniko:
            dockerfile: Dockerfile.dev
            flags:
              - "--compressed-caching=false"
              - "--snapshot-mode=redo"
            cache:
              repo: harbor.local.narwhal.internal/library/narwhal-portal-cache
            volumeMounts:
              - name: narwhal-ca
                mountPath: /kaniko/ssl/certs/narwhal
            registryCertificate:
              harbor.local.narwhal.internal: /kaniko/ssl/certs/narwhal/ca.crt
          sync:
            manual:
              - src: "src/**/*.{ts,tsx,js,jsx,css}"
                dest: /app
              - src: "public/**/*"
                dest: /app
    deploy:
      kubectl:
        defaultNamespace: devtools
        flags:
          apply:
            - --server-side
            - --force-conflicts
        hooks:
          after:
            - host:
                command:
                  - sh
                  - -c
                  - |
                    kubectl -n devtools set env deployment/narwhal-portal \
                      NODE_OPTIONS=--inspect=127.0.0.1:9229
                    kubectl -n devtools rollout status deployment/narwhal-portal --timeout=120s
    portForward:
      - resourceType: service
        resourceName: narwhal-portal
        namespace: devtools
        port: 3000
        localPort: 3000
      - resourceType: deployment
        resourceName: narwhal-portal
        namespace: devtools
        port: 9229
        localPort: 9229
